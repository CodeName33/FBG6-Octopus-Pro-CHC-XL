[force_move]
enable_force_move: True

[input_shaper]

[pause_resume]

[display_status]

[respond]

[exclude_object]

[sdcard_loop]

[gcode_arcs]

[skew_correction]


[stepper_x]
microsteps: 16
rotation_distance: 40
homing_speed: 140

[stepper_y]
microsteps: 16
rotation_distance: 40
homing_speed: 140

[stepper_z]
microsteps: 16
rotation_distance: 8
second_homing_speed: 4
homing_speed: 28

position_min: -1
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 3
second_homing_speed: 3
homing_retract_dist: 5.0 

[extruder]
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: 0
max_extrude_cross_section: 999999
max_extrude_only_distance: 200
microsteps: 16

[heater_bed]
min_temp: 0
max_temp: 120

[heater_fan hotend_fan]
heater: extruder
heater_temp: 40.0
fan_speed: 1.0

[fan]
max_power: 1.0

[controller_fan electronics_fan]
heater: extruder, heater_bed
stepper: stepper_x, stepper_y, stepper_z, extruder
fan_speed: 1.0

[bed_mesh]
speed: 400
horizontal_move_z: 3
fade_start: 1.0
fade_end: 5.0
algorithm: bicubic
mesh_pps: 0, 0
bicubic_tension: 0.1

#[screws_tilt_adjust]
#horizontal_move_z: 10
#speed: 150

# Стили: primary (синий), secondary (серый), info (голубой), warning (желтый), error (красный)


[gcode_macro _OUTPUT]
gcode:
    {% set text = params.MSG | default("") | string %}
    RESPOND MSG="<span type='WUI-OUTPUT'>{text}</span>"

[gcode_macro _CLODE_DIALOG]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro CHANGE_FILAMENT_DIALOG]
description: Сменить филамент
gcode:
    {% set unload_temp = params.UNLOAD_TEMP | default(-1) | int %}
    {% set load_temp = params.LOAD_TEMP | default(-1) | int %}
    {% set speed = params.SPEED | default(300) | int %}
    {% set length = params.LENGTH | default(60) | int %}


    _OUTPUT MSG="unload_temp = {unload_temp}..."
    {% if unload_temp == -1 %}
        RESPOND TYPE=command MSG="action:prompt_begin Выбор действия"
        RESPOND TYPE=command MSG="action:prompt_text Какой пластик выгрузить?"

        RESPOND TYPE=command MSG="action:prompt_button TPU|CHANGE_FILAMENT_DIALOG UNLOAD_TEMP=230 SPEED=150 LENGTH=60|primary"
        RESPOND TYPE=command MSG="action:prompt_button PLA|CHANGE_FILAMENT_DIALOG UNLOAD_TEMP=230 SPEED=300 LENGTH=60|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG/ABS (CF)|CHANGE_FILAMENT_DIALOG UNLOAD_TEMP=250 SPEED=300 LENGTH=60|primary"
        RESPOND TYPE=command MSG="action:prompt_button Не выгружать|CHANGE_FILAMENT_DIALOG UNLOAD_TEMP=-2|warning"
        
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        {% if unload_temp != -2 %}
            RESPOND TYPE=command MSG="action:prompt_end"
            _OUTPUT MSG="Нагрев до {unload_temp}..."
            M104 S{unload_temp}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={unload_temp}
            _OUTPUT MSG="Извлечение..."

            M83
            G1 E10 F300
            G1 E-{length} F{speed}
            _OUTPUT MSG="Извлечение завершено"
        {% endif %}

        {% if load_temp == -1 %}
            RESPOND TYPE=command MSG="action:prompt_begin Выбор действия"
            RESPOND TYPE=command MSG="action:prompt_text Какой пластик загрузить?"
    
            RESPOND TYPE=command MSG="action:prompt_button TPU|CHANGE_FILAMENT_DIALOG UNLOAD_TEMP=-2 LOAD_TEMP=230 SPEED=100 LENGTH=180|primary"
            RESPOND TYPE=command MSG="action:prompt_button PLA|CHANGE_FILAMENT_DIALOG UNLOAD_TEMP=-2 LOAD_TEMP=230 SPEED=300 LENGTH=180|primary"
            RESPOND TYPE=command MSG="action:prompt_button PETG/ABS (CF)|CHANGE_FILAMENT_DIALOG UNLOAD_TEMP=-2 LOAD_TEMP=250 SPEED=300 LENGTH=180|primary"
            RESPOND TYPE=command MSG="action:prompt_button Не Загружать|_CLODE_DIALOG|warning"
            
            RESPOND TYPE=command MSG="action:prompt_show"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_end"
            _OUTPUT MSG="Нагрев до {load_temp}..."
            M104 S{load_temp}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={load_temp}
            _OUTPUT MSG="Загрузка..."

            M83
            G1 E10 F300
            G1 E{length} F{speed}
            _OUTPUT MSG="Загрузка завершена"
            RESPOND TYPE=command MSG="action:prompt_end"
            M104 S0
        {% endif %}
    {% endif %}
    
[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    {% set wait_after_bad = params.WAIT_AFTER_BED | default(0) | int %}

    # 1. Начинаем греть стол (не ждем полного нагрева для экономии времени)
    M140 S{BED_TEMP}
    
    # 2. Ждем нагрева стола
    _OUTPUT MSG="Нагрев стола  {BED_TEMP}"
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP}

    # 3. Сброс настроек и парковка
    G90 ; Абсолютные координаты
    M83 ; Относительная экструзия
    G28 ; Home всех осей

    {% if wait_after_bad > 0 %}
        _OUTPUT MSG="Преднагрев рабочей зоны  {wait_after_bad} сек"
        G4 P{wait_after_bad * 1000}
    {% endif %}


    _OUTPUT MSG="Калибровка стола"
    # 4. (Опционально) Калибровка сетки стола
    BED_MESH_CALIBRATE

    #M109 S{EXTRUDER_TEMP}
    M104 S{EXTRUDER_TEMP}   # Установить температуру сопла
    
    # 5. Едем в точку старта для разогрева сопла (чтобы не капало на центр стола)
    G1 Z5 F3000
    G1 X5 Y5 F5000

    _OUTPUT MSG="Нагрев хотэнда"
    # 6. Ждем нагрева сопла
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP}
    
    # 7. Рисуем "линию очистки" (Prime Line)
    G1 Z0.3 F300
    G1 X100 E15 F1000 ; Первая линия
    G1 Y5.4 F5000     ; Сдвиг вбок
    G1 X10 E30 F1000  ; Вторая линия обратно
    G1 Z2 F3000       ; Приподнять сопло

    SET_SKEW XY=141.3,139.7,99.15
    _OUTPUT MSG="Печать началась"

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set z = params.Z|default(10)|int %}                                            # Отвод по Z на 10мм
    {% set x = params.X|default(5)|int %}                                             # Парковка X в начало
    {% set y = params.Y|default(5)|int %}                                             # Парковка Y в начало
    {% set etemp = printer.extruder.target %}                                         # Запоминаем температуру
    
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-2 F2700                                                                      # Небольшой ретракт
    G1 Z{z} F900                                                                      # Подъем Z
    G90
    G1 X{x} Y{y} F6000        

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E2 F2700                                                                       # Возвращаем пластик
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    END_PRINT
    BASE_CANCEL_PRINT
    _OUTPUT MSG="Печать отменена"

[gcode_macro END_PRINT]
gcode:
    # 1. Безопасный отвод сопла
    G91 ; Относительные координаты
    G1 E-3 Z5 F3000 ; Ретракт и подъем на 5мм
    G1 Z20 F600  
    
    # 2. Парковка головы и подача стола вперед (для удобства)
    G90 ; Абсолютные координаты
    G1 X0 Y0 F6000 # Замените Y280 на ваш размер стола (чтобы он выехал вперед)
    
    # 3. Выключение всего
    M106 S0 ; Выключить обдув
    M104 S0 ; Выключить хотенд
    M140 S0 ; Выключить стол
    M84 X Y E ; Выключить моторы (кроме Z, чтобы стол не упал)

    SET_SKEW CLEAR=1
    
    # Сообщение на экран
    M117 Print Finished!
    _OUTPUT MSG="Печать окончена"

[gcode_macro M106]
rename_existing: G106
gcode:
    {% if params.P is defined %}
        {% if params.P|int == 3 %}
            {% if params.S is defined %}
                SET_FAN_SPEED FAN=exhaust_fan SPEED={params.S|float / 255}
            {% else %}
                SET_FAN_SPEED FAN=exhaust_fan SPEED=1
            {% endif %}
        {% endif %}
    {% else %}
        {% if params.S is defined %}
            G106 S{params.S}
        {% else %}
            G106 S255
        {% endif %}
    {% endif %}

[gcode_macro M107]
rename_existing: G107
gcode:
    {% if params.P is defined %}
        {% if params.P|int == 3 %}
            SET_FAN_SPEED FAN=exhaust_fan SPEED=0
        {% endif %}
    {% else %}
        G107
    {% endif %}