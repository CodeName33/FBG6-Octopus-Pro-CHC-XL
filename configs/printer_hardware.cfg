[stepper_x] #MOTOR0
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
full_steps_per_rotation: 400
endstop_pin: ^!PG6

[stepper_y] #MOTOR1
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
full_steps_per_rotation: 400
endstop_pin: ^!PG12

[stepper_z] #MOTOR3
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
full_steps_per_rotation: 200
#endstop_pin: ^!PG9

[extruder] #MOTOR4
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
full_steps_per_rotation: 200

