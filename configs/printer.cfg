[include printer_hardware.cfg]
[include printer_base.cfg]



[mcu]
serial: /dev/ttyS5
baud: 250000
restart_method: command 

[virtual_sdcard]
path: /home/user/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 20000
minimum_cruise_ratio: 0.5
square_corner_velocity: 10
max_z_velocity: 20
max_z_accel: 100

[stepper_x]
position_min: 0
position_endstop: 0
position_max: 255

[stepper_y]
position_min: 0
position_endstop: 0
position_max: 210

[stepper_z]
position_max: 200

[extruder]
max_temp: 320
rotation_distance: 4.5
sensor_type: PT1000
full_steps_per_rotation: 200

[heater_bed]
sensor_type: EPCOS 100K B57560G104F

[safe_z_home]
home_xy_position: 149, 132 # Центр вашего стола
speed: 400
z_hop: 6                  # Поднять сопло перед движением
z_hop_speed: 20

[bed_mesh]
mesh_min: 4.0,0.0 # Левая передняя точка, в которой будет снята карта высот стола. Указывается координата именно точки, в которой снимается высота. Положение головы при этом будет смещено на значения -x_offset и -y_offset
mesh_max: 233.0,183.0 # Правая задняя точка, в которой будет снята карта высот стола. Указывается координата именно точки, в которой снимается высота. Положение головы при этом будет смещено на значения -x_offset и -y_offset
probe_count: 9,7 # Количество точек карты высот стола вдоль осей X, Y
zero_reference_position: 127.0,105.0 # Координаты центра стола


[input_shaper]
#shaper_type_x: 3hump_ei
#shaper_freq_x: 53.38
#shaper_type_y: 3hump_ei
#shaper_freq_y: 53.38

shaper_type_x: 2hump_ei
shaper_freq_x: 54.02
shaper_type_y: 2hump_ei
shaper_freq_y: 62.02

#damping_ratio_x: 0.1
#damping_ratio_y: 0.145
#shaper_type_x: mzv
#shaper_freq_x: 30.03
#shaper_type_y: mzv
#shaper_freq_y: 33.55
#shaper_type_x: mzv
#shaper_freq_x: 60.8
#shaper_type_y: mzv
#shaper_freq_y: 57.4


